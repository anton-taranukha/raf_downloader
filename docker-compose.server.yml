services:
  app:
    image: ghcr.io/anton-taranukha/raf_downloader:latest
    ports:
      - "8080:8080"
    env_file:
      - ./google-drive.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: "/run/secrets/google-service-account.json"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
      DOWNLOAD_LOG_DB_PATH: "/data/download-log"
    volumes:
      - "./secrets/service-account.json:/run/secrets/google-service-account.json:ro"
      - "download-data:/data"
    restart: unless-stopped

volumes:
  download-data:
