services:
  app:
    image: ${APP_IMAGE}
    ports:
      - "8080:8080"
    environment:
      GOOGLE_DRIVE_FOLDER_ID: "13A-wpOaLfwUxt2XEo077_BolG6R9ccpx"
      GOOGLE_APPLICATION_CREDENTIALS: "/run/secrets/google-service-account.json"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    volumes:
      - "./secrets/service-account.json:/run/secrets/google-service-account.json:ro"
    restart: unless-stopped
