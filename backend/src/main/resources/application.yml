server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:${DOWNLOAD_LOG_DB_PATH:./download-log};AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

google-drive:
  folder-id: ${GOOGLE_DRIVE_FOLDER_ID:1hbWUcdEkdDcPMGi-9lTB1ykqcBsq1gTA}
  # Path to a service account JSON key. If empty, Application Default Credentials are used.
  credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
